<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manager Arena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
      <button class="audio-toggle" onclick="toggleAudio()" id="audioBtn">🔊 Enable Audio Assistance</button>
  <div class="arena-container" style="max-width: 600px;">
    <h2>Parent Dashboard</h2>
    <div style="margin-bottom: 20px;">
      <label>Set Total Budget: </label>
      <input type="number" id="total-budget" value="100" onchange="calculate()">
    </div>
    
    <div id="balance-card" class="status-box" style="background: #444;">
      Remaining: <span id="balance-val">$100</span>
    </div>

    <table style="width:100%; text-align:left;">
      <thead><tr><th>Item</th><th>Cost</th><th>Action</th></tr></thead>
      <tbody id="expense-body"></tbody>
    </table>
  </div>
  <script src="parent-logic.js"></script>
</body>
</html>
