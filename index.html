<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotus Arena - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-container">
        <div class="logo-container">
            <img src="./Lotus.png" alt="Lotus Logo" style="width:50px; height:50px; border-radius:50%;">
        </div>
        <div>
            <span class="brand-name">Lotus</span>
            <span class="subtitle">Budget Arena Simulation</span>
        </div>
    </div>

    <div class="login-card">
        <button id="audioBtn" onclick="toggleAudio()" style="background:#444; margin-bottom:15px;">🔊 Enable Game Voice</button>
        
        <h2>Select Your Role</h2>
        <div class="role-selection" style="display: flex; gap: 10px; margin-bottom: 15px;">
            <label style="flex: 1;">
                <input type="radio" name="role" value="student" checked style="display:none;">
                <div class="role-option">🎮 Player (Student)</div>
            </label>
            <label style="flex: 1;">
                <input type="radio" name="role" value="manager" style="display:none;">
                <div class="role-option">⚙️ Manager (Admin)</div>
            </label>
        </div>

        <input type="password" id="pin-code" placeholder="Enter 4-Digit PIN" maxlength="4">
        <button onclick="login()">Enter Arena</button>
    </div>

    <script src="accessibility.js"></script>
    <script src="auth-logic.js"></script>
</body>
</html>
