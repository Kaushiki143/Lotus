<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lotus Arena - Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-container">
        <div class="logo-container"><img src="./Lotus.png" alt="Lotus Logo" style="width:40px;"></div>
        <span class="brand-name">Player Console</span>
    </div>

    <div class="arena-container">
        <button id="audioBtn" onclick="toggleAudio()" style="background:#444; margin-bottom:10px;">🔊 Voice Off</button>

        <div id="status-box" class="status-box good-budget">
            <h2 id="game-status">🛡️ Arena: Active</h2>
            <div id="balance-val" style="font-size: 3rem;">$0.00</div>
        </div>

        <div class="login-card">
            <h3>Execute Action</h3>
            <input type="text" id="desc" placeholder="Item Name or Hustle">
            <input type="number" id="amt" placeholder="Value ($)">
            <div style="display: flex; gap: 10px;">
                <button onclick="addMove('expense')" style="background:var(--danger); color:white;">Spend Gold</button>
                <button onclick="addMove('earning')" style="background:var(--success); color:#000;">Refill Gold</button>
            </div>
        </div>

        <button onclick="window.location.href='index.html'" style="background: transparent; border: 1px solid #555; color: #aaa;">Logout</button>
    </div>

    <script src="accessibility.js"></script>
    <script src="student-logic.js"></script>
</body>
</html>
